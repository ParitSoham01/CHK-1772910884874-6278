<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CurePoint - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container" style="max-width:400px;margin:4rem auto;">
        <div class="card" id="loginCard">
            <h2 style="text-align:center;margin-bottom:2rem;">Login to CurePoint</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Login as</label>
                    <select id="userType">
                        <option value="patient">Patient</option>
                        <option value="hospital">Hospital/Provider</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required />
                </div>
                <div id="patientFields" style="display:none;">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullname" />
                    </div>
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="age" />
                    </div>
                    <div class="form-group">
                        <label>Known Illnesses (comma separated)</label>
                        <input type="text" id="illnesses" />
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
            </form>
        </div>
        <div class="card" id="profileCard" style="display:none;margin-top:2rem;">
            <h3>Patient Profile</h3>
            <p id="profileInfo"></p>
        </div>
    </div>
    <script>
        const userTypeEl = document.getElementById('userType');
        const patientFields = document.getElementById('patientFields');

        userTypeEl.addEventListener('change', () => {
            patientFields.style.display = userTypeEl.value === 'patient' ? 'block' : 'none';
        });

        document.getElementById('loginForm').addEventListener('submit', function(e){
            e.preventDefault();
            const userType = userTypeEl.value;
            if (userType === 'patient') {
                const name = document.getElementById('fullname').value || 'Unknown';
                const age = document.getElementById('age').value || 'N/A';
                const illnesses = document.getElementById('illnesses').value || 'None';
                const info = `Name: ${name}<br>Age: ${age}<br>Illnesses: ${illnesses}`;
                document.getElementById('profileInfo').innerHTML = info;
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('profileCard').style.display = 'block';
            } else {
                // redirect for hospital or provider
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
